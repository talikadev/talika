[project.theme]
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  "navigation.expand", 
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path", # "navigation.sections",
  "navigation.tabs", # "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

favicon = "assets/images/svg/logoalpha.svg"
language = "en"
logo = "assets/images/svg/logoalpha.svg"
font.text = "Google Sans"
font.code = "Google Sans Code"
custom_dir = "docs/overrides"

[project.extra]
generator = false

# [[project.extra.social]]
# icon = "fontawesome/brands/github"
# link = "https://github.com/talikadev/talika"

[[project.theme.palette]]
accent = "talika-accent"
media = "(prefers-color-scheme)"
primary = "amber"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
accent = "talika-accent"
media = "(prefers-color-scheme: dark)"
primary = "amber"
scheme = "slate"
toggle.icon = "lucide/moon-star"
toggle.name = "Switch to system preference"

[[project.theme.palette]]
accent = "talika-accent"
media = "(prefers-color-scheme: light)"
primary = "amber"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"


[project.theme.icon]
repo = "material/github"

[project.theme.icon.tag]
default = "lucide/hash"

[project.extra.tags]
docs = "docs"

[project.plugins.offline]
enabled = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.caret]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
options.custom_icons = ["docs/overrides/.icons"]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
auto_title = false
line_spans = "__span"
# linenums = true
linenums_style = "pymdownx-inline"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/abbreviations.md"]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  {name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format"},
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.toc]
permalink = "⚓︎"

[project.markdown_extensions.zensical.extensions.preview]
configurations = [{targets = {include = ["start/**", "learn/**", "guides/**", "reference/**"]}}]


[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
# Docstring parsing style: "google", "numpy", "sphinx", or None
docstring_style = "google"

# Show the source code of the object in the documentation
show_source = false

# Show a heading for the root object (the one specified in the ::: directive)
show_root_heading = true

# Show the full dotted path (e.g., framework.core.logging) for the root object
show_root_full_path = false

# Show the full dotted path for all objects, not just the root
show_object_full_path = false

# Show headings to group members by category (Methods, Attributes, Classes, etc.)
show_category_heading = false

# Include objects that have no docstring in the output
show_if_no_docstring = false

# Show function/method signatures (parameters, return type)
show_signature = true

# Show type annotations in signatures (e.g., def func(x: int) -> str)
show_signature_annotations = true
show_signature_type_parameters = true
# Render signature in a separate block above the docstring (vs inline)
separate_signature = true
show_attribute_values = true

# Convert type annotations in signatures to clickable cross-references
signature_crossrefs = true

# Maximum line length for formatting signatures
line_length = 88

# Include inherited members when documenting a class
inherited_members = false

# Order in which to list members: "source" (file order) or "alphabetical"
members_order = "source"

# members = true
filters = []

# Style for docstring sections (Parameters, Returns, Raises): "table", "list", "spacy"
docstring_section_style = "list"

# Merge __init__ method documentation into the class docstring
merge_init_into_class = true

# Show parameter names as headings above their descriptions
parameter_headings = false

# Show a badge indicating the symbol type (function, class, method, etc.) next to headings
show_symbol_type_heading = true

# Show symbol types in the table of contents
show_symbol_type_toc = true



