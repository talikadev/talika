name: Release to TestPyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Verify and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(uv run python -c 'from importlib.metadata import version; print(version("talika"))')"
          test "$GITHUB_REF_NAME" = "v$package_version"

      - name: Run tests and quality checks
        run: |
          uv run pytest -p no:cacheprovider
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src tests/typing/public_api.py

      - name: Build wheel and source distribution
        run: uv build

      - name: Store distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/talika
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  github-release:
    name: Create GitHub Release
    needs: publish-testpypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Extract release notes from changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v heading="## $version" '
            $0 == heading { found = 1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Create release and attach distributions
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/*
          --verify-tag
          --title "$GITHUB_REF_NAME"
          --notes-file release-notes.md
