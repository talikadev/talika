name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - run: uv lock --check

  test:
    needs: lockfile
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --locked --all-extras --dev
      - run: uv run --no-sync pytest -p no:cacheprovider

  minimum-dependencies:
    needs: lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"
      - run: uv sync --locked --all-extras --dev
      - run: >-
          uv pip install
          "gherkin-official==29.0.0"
          "pydantic==2.0.0"
          "pytest==8.0.0"
          "pytest-bdd==8.0.0"
          "pytest-cov==6.0.0"
      - run: uv pip check
      - run: uv run --no-sync pytest -p no:cacheprovider

  current-dependencies:
    needs: lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --locked --all-extras --dev
      # pytest-bdd selects its compatible gherkin-official release. Upgrading
      # gherkin independently can force pytest-bdd below Talika's >=8 contract.
      - run: >-
          uv pip install --upgrade
          pydantic pytest "pytest-bdd>=8.0" pytest-cov
      - run: uv pip check
      - run: uv run --no-sync pytest -p no:cacheprovider

  quality:
    needs: lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --locked --all-extras --all-groups
      - run: uv run --no-sync coverage run --branch -m pytest -p no:cacheprovider
      - run: uv run --no-sync coverage report --fail-under=90
      - run: uv run --no-sync ruff check .
      - run: uv run --no-sync ruff format --check .
      - run: uv run --no-sync mypy src tests/typing/public_api.py
      - run: uv run --no-sync zensical build --strict
      - name: Build wheel and source distribution once
        run: uv build
      - name: Smoke-test the exact core wheel and source distribution
        shell: bash
        run: |
          version="$(uv run --no-sync python -c 'from importlib.metadata import version; print(version("talika"))')"
          wheel="dist/talika-${version}-py3-none-any.whl"
          sdist="dist/talika-${version}.tar.gz"
          test -f "$wheel"
          test -f "$sdist"

          python -m venv .smoke-core
          .smoke-core/bin/python -m pip install "$wheel"
          .smoke-core/bin/python -m pip check
          .smoke-core/bin/python -c "from importlib.metadata import version; from talika import RowTable, field; T = type('SmokeTable', (RowTable,), {'value': field(required=True)}); assert version('talika') == '$version'; assert T.parse([['value'], ['ok']])[0].value == 'ok'"

          python -m venv .smoke-sdist
          .smoke-sdist/bin/python -m pip install "$sdist"
          .smoke-sdist/bin/python -m pip check
          .smoke-sdist/bin/python -c "from importlib.metadata import version; assert version('talika') == '$version'"
