name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
            pytest: "pytest>=8,<9"
          - os: ubuntu-latest
            python: "3.11"
            pytest: "pytest>=9,<10"
          - os: ubuntu-latest
            python: "3.12"
            pytest: "pytest>=9,<10"
          - os: windows-latest
            python: "3.13"
            pytest: "pytest>=9,<10"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --all-extras --dev
      - run: uv pip install "${{ matrix.pytest }}"
      - run: uv run pytest -p no:cacheprovider

  minimum-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"
      - run: uv sync --all-extras --dev
      - run: >-
          uv pip install
          "gherkin-official==29.0.0"
          "pydantic==2.0.0"
          "pytest==8.0.0"
          "pytest-bdd==8.0.0"
      - run: uv run pytest -p no:cacheprovider

  current-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --all-extras --dev
      - run: >-
          uv pip install --upgrade
          gherkin-official pydantic pytest pytest-bdd pytest-cov
      - run: uv run pytest -p no:cacheprovider

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - run: uv run coverage run --branch -m pytest -p no:cacheprovider
      - run: uv run coverage report --fail-under=90
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src tests/typing/public_api.py
      - run: uv run --group docs zensical build --strict
      - run: uv build
      - name: Smoke-test built wheel
        run: |
          python -m venv wheel-smoke
          wheel-smoke/bin/python -m pip install dist/*.whl
          wheel-smoke/bin/python -c "from talika import Diagnostic, DiagnosticSeverity, RowTable, ValidationResult, field, validate_table; T = type('SmokeTable', (RowTable,), {'value': field('value', required=True)}); assert T.parse([['value'], ['ok']])[0].value == 'ok'; valid = validate_table(T, [['value'], ['ok']]); invalid = T.validate([['value'], ['']]); assert isinstance(valid, ValidationResult) and valid.valid; assert not invalid.valid and invalid.records == (); assert Diagnostic(code='smoke', message='ok', severity=DiagnosticSeverity.WARNING).diagnostic_version == 1"
          wheel-smoke/bin/talika --help
          wheel-smoke/bin/talika describe talika.schema:RowTable
          wheel-smoke/bin/python -m pip install "gherkin-official>=29.0"
          wheel-smoke/bin/python -c "from pathlib import Path; Path('wheel-smoke.feature').write_text('Feature: Smoke\\n  Scenario: Valid\\n    Given values:\\n      | value |\\n      | ok    |\\n', encoding='utf-8'); Path('wheel_smoke_schema.py').write_text('from talika import RowTable, field\\nclass SmokeTable(RowTable):\\n    value = field(\\\"value\\\", required=True)\\n', encoding='utf-8')"
          wheel-smoke/bin/talika check wheel-smoke.feature --schema wheel_smoke_schema.py:SmokeTable --format json | wheel-smoke/bin/python -c "import json, sys; payload = json.load(sys.stdin); assert payload['format_version'] == 1 and payload['status'] == 'valid', payload"
